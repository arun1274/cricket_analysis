spring.application.name=cpi-backend

# Railway provides individual PG* variables when PostgreSQL is attached.
# We construct the JDBC URL from these components because Railway's DATABASE_URL
# uses postgresql:// format which is incompatible with Spring Boot's jdbc:postgresql:// format.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:cpi_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:8f2a5c4e9d7b1a3f6c8e0d2b4a6f8c0e2d4b6a8c0e2d4f6a8c0e2d4f6a8c0e2d}
jwt.expiration=86400000

# Railway dynamically assigns PORT. Fall back to 8080 for local dev.
server.port=${PORT:8080}
